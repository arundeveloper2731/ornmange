<!DOCTYPE html>
<html>
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="login-page">
        <div class="container">
            <div class="login-logo">
                 <div class="brand">Air<span>Fiber</span></div>
                <p>ORN Management System</p>
            </div>
       <div>
            <form  id="loginform" action="https://ornmanagement-production.up.railway.app/login" method="post">
                <div class="input-group">
                    <label for="">UserName</label>
                    <input type="text" id="username" name="username" placeholder="enter username" required>
                </div>

                <div class="input-group">
                    <label for="">Password</label>
                    <input type="password" name="password" id="password" placeholder="password">
                </div>

                <button type="submit" class="btn btn-primary" >Login</button>
            </form>

       </div>
        

        <p>New User? 
            <a href="/html/signup.html"><span>Create Account </span></a>
        </p>
    </div>

    <div id="error-msg" style="color:red; display:none;">
            Invalid Username or Password
        </div>

        <div id="logout-msg" style="color:green; display:none;">
            Logged out successfully
        </div>

    </div>
    <script src="/javascript/login.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has("error")) document.getElementById("error-msg").style.display = "block";
        if (params.has("logout")) document.getElementById("logout-msg").style.display = "block";
    </script>
    
</body>
</html>
