<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORN-ENTRY</title>
    <link rel="stylesheet" href="/css/orn-entry.css">
    <!-- fontawersome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>ORN MANAGEMENT SYSTEM</h2>

        <ul>
                <li><a href="/index.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="/html/orn-entry.html"> <i class="fa-solid fa-file-circle-plus"></i>ORN ENTRY</a></li>
                <li><a href="/html/excel-upload.html"><i class="fa-solid fa-file-excel"></i>Excel Upload</a></li>
                <li><a href="/html/orn-matching.html"><i class="fa-solid fa-check"></i>ORN MATCH</a></li>
                <li><a href="/html/expensetracker.html"><i class="fa-solid fa-money-bill"></i>ADD EXPENSE</a></li>
                <li><a href="/html/reports.html"><i class="fa-regular fa-file"></i>REPORTS</a></li>

            </ul>
        <div class="logout">
            <a href="/logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </div>


    <!-- orn manual entry -->
    <div class="container">
        <div class="page-header">
            <div class="menu-btn" onclick="toggleMenu1()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <h1>ORN Manual Entry</h1>
            <button class="add-btn">+ New Orn</button>
        </div>



        <div class="form-card">
            <form action="" id="ornform">
                <div class="input-group">
                    <label for="">ORN Number</label>
                    <input type="text" id="ornNo" placeholder="enter orn number">
                </div>

                <div class="input-group">
                    <label for="">Customer Name</label>
                    <input type="text" id="customerName" placeholder="customer name">
                </div>

                <div class="input-group">
                    <label for="">Mobile Number</label>
                    <input type="number" id="mobileNumber" placeholder="mobile number">
                </div>

                <div class="input-group">
                    <label for="">Location</label>
                    <input type="text" id="location" placeholder="enter location">
                </div>

                <div class="input-group">
                    <label for="">Amount</label>
                    <input type="number" id="amount" placeholder="Amount">
                </div>

                <div class="input-group">
                    <label for="">Installation Date</label>
                    <input type="date" id="transactionDate">
                </div>

                <div class="input-group">
                    <label for="">Status</label>
                    <select name="" id="status">
                        <option value="">Select status</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="button" onclick="saveOrn()" class="save-btn">Save ORN</button>
                    <button type="button" onclick="resetOrn()" class="reset-btn">Reset</button>
                </div>


            </form>
        </div>
        <div class="search-card">
            <input type="text" id="searchOrn" onkeyup="searchOrn()" placeholder="Search orn Number..">
        </div>

        <div class="table-card">
            <div class="table-header">
                <h2>Recent ORN Entries</h2>
            </div>
            <div class="filter-card">

                <div class="filter-group">
                    <label>From Date</label>
                    <input type="date" id="fromDate">
                </div>

                <div class="filter-group">
                    <label>To Date</label>
                    <input type="date" id="toDate">
                </div>

                <div class="filter-group">
                    <label>Status</label>
                    <select id="filterStatus">
                        <option value="">All</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>

                <div class="filter-group">
                    <button class="btn-primary" onclick="applyFilter()">
                        Apply Filter
                    </button>
                </div>

                <div class="filter-group">
                    <button class="btn-primary" onclick="clearFilter()">
                        Clear
                    </button>
                </div>

            </div>


            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ORN No</th>
                            <th>Customer</th>
                            <th>Mobile Number</th>
                            <th>Location</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/javascript/orn-entry.js"></script>


</body>

</html>
