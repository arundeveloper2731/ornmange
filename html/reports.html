<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="/css/report.css">
    <!-- fontawersome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>ORN MANAGEMENT SYSTEM</h2>

            <ul>
                <li><a href="/index.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="/html/orn-entry.html"> <i class="fa-solid fa-file-circle-plus"></i>ORN ENTRY</a></li>
                <li><a href="/html/excel-upload.html"><i class="fa-solid fa-file-excel"></i>Excel Upload</a></li>
                <li><a href="/html/orn-matching.html"><i class="fa-solid fa-check"></i>ORN MATCH</a></li>
                <li><a href="/html/expensetracker.html"><i class="fa-solid fa-money-bill"></i>ADD EXPENSE</a></li>
                <li><a href="/html/reports.html"><i class="fa-regular fa-file"></i>REPORTS</a></li>

            </ul>
            <div class="logout">
                <a href="/html/login.html">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </div>

        <!-- Main -->
        <main class="main-content">

            <!-- Header -->
            <div class="topbar">
                <div class="page-header">

                    <div class="menu-btn" onclick="toggleMenu()">
                        <i class="fa-solid fa-bars"></i>
                    </div>

                    <h1>Reports</h1>
                </div>

                <div class="header-actions">
                    <button class="btn export">
                        <i class="fa-solid fa-file-export"></i>
                        Export Excel
                    </button>

                    <button class="btn pdf">
                        <i class="fa-solid fa-file-pdf"></i>
                        Export PDF
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <section class="filters">

                <div class="form-group">
                    <label>From Date</label>
                    <input type="date" id="fromDate">
                </div>

                <div class="form-group">
                    <label>To Date</label>
                    <input type="date" id="toDate">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option>All</option>
                        <option>Matched</option>
                        <option>Unmatched</option>
                        <option>Duplicate</option>
                    </select>
                </div>



                <button class="search-btn">
                    Generate Report
                </button>

            </section>

            <!-- Summary -->
            <section class="summary-cards">

                <div class="card">
                    <h3>Total ORN</h3>
                    <span id="totalOrn">0</span>
                </div>

                <div class="card">
                    <h3>Matched</h3>
                    <span id="matched">0</span>
                </div>

                <div class="card">
                    <h3>Unmatched</h3>
                    <span id="unmatched">0</span>
                </div>

                <div class="card">
                    <h3>Total Expense</h3>
                    <span id="expense">0</span>
                </div>

            </section>

            <!-- Report Table -->
            <section class="table-section">

                <div class="table-header">
                    <h2>Report Details</h2>
                </div>

                <div class="table-wrapper">

                    <table>

                        <thead>
                            <tr>
                                <th>ORN Number</th>
                                <th>Customer</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Expense</th>
                                <th>Date</th>
                            </tr>
                        </thead>

                        <tbody id="reportTable">

                        </tbody>

                    </table>

                </div>

            </section>

        </main>





    </div>

    <script src="/javascript/report.js"></script>

</body>

</html>
